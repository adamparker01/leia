document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-count=\"5\">\n        <div style=\"display:flex;align-items:center;gap:12px;background:#fff;padding:12px 14px\">\n          <span style=\"font:700 12px 'Space Grotesk';color:#3f5945;width:56px\">{{ it.time }}<\u002Fspan>\n          <div style=\"flex:1\"><span style=\"font:600 12px 'DM Sans'\">{{ it.label }}<\u002Fspan><span style=\"font:500 11px 'DM Sans';color:#a29d8f\"> {{ it.sub }}<\u002Fspan><\u002Fdiv>\n          <span style=\"width:9px;height:9px;border-radius:50%;background:{{ it.color }}\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ noToday }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#fff;border:1px dashed #d5cfc0;border-radius:15px;padding:22px 16px;text-align:center;margin-bottom:20px;font:500 12px 'DM Sans';color:#8b8678\">No activity yet today — tap a button above to log Leia's first feed, poo or wee.<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div sc-camel-on-click=\"{{ goFeeds }}\" style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e2ddd0;border-radius:15px;padding:14px;margin-bottom:10px;cursor:pointer\">\n      <div><div style=\"font:700 12px 'Space Grotesk';letter-spacing:.03em\">NEXT FEED<\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#8b8678\">{{ nextFeedTime }} · {{ perFeed }} g<\u002Fdiv><\u002Fdiv>\n      <div style=\"margin-left:auto;font:700 24px 'Space Grotesk';color:#3f5945\">→<\u002Fdiv>\n    <\u002Fdiv>\n    <div sc-camel-on-click=\"{{ goVets }}\" style=\"display:flex;align-items:center;gap:12px;background:#faf5ea;border:1px solid #ecdcbb;border-radius:15px;padding:14px;cursor:pointer\">\n      <span style=\"width:9px;height:9px;border-radius:50%;background:#c9a25f\"><\u002Fspan>\n      <div><div style=\"font:700 12px 'Space Grotesk';letter-spacing:.03em;color:#8a6a24\">UPCOMING AT VETS<\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#8b7a53\">{{ nextVetLabel }}<\u002Fdiv><\u002Fdiv>\n      <div style=\"margin-left:auto;font:700 24px 'Space Grotesk';color:#c9a25f\">→<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ FOOD ============ -->\n<sc-if value=\"{{ isFeeds }}\" hint-placeholder-val=\"{{ true }}\">\n<div class=\"scrollarea\" style=\"height:100%;padding:0 0 78px\">\n  <div class=\"pagehdr\" style=\"padding:52px 22px 16px;background:#3f5945\">\n    <div style=\"font:700 24px 'Space Grotesk';letter-spacing:.01em;color:#fff\">Food<\u002Fdiv>\n    <div style=\"font:500 11px 'DM Sans';color:#c3d3c6;margin-top:2px\">Stock, feeding plan &amp; restocks<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:18px\">\n    <!-- food stock forecast -->\n    <div style=\"background:#faf5ea;border:1px solid #ecdcbb;border-radius:18px;padding:18px;margin-bottom:16px\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline\"><span style=\"font:700 12px 'Space Grotesk';letter-spacing:.03em;color:#8a6a24\">FOOD STOCK<\u002Fspan><span style=\"font:500 11px 'DM Sans';color:#8b7a53\">{{ stockKg }} kg left<\u002Fspan><\u002Fdiv>\n      <sc-if value=\"{{ hasStock }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;align-items:flex-end;gap:8px;margin-top:8px\"><div style=\"font:700 40px 'Space Grotesk';line-height:.85;color:#20241f;white-space:nowrap\">{{ daysLeft }}<span style=\"font-size:15px;color:#8b7a53\"> days<\u002Fspan><\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#8b7a53;margin-bottom:5px\">left · runs out {{ runOut }}<\u002Fdiv><\u002Fdiv>\n      <div style=\"height:8px;border-radius:4px;background:#efe3c8;margin-top:14px\"><div style=\"height:8px;border-radius:4px;background:#c9a25f;width:{{ stockPct }}%\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;margin-top:8px;font:500 11px 'DM Sans';color:#8b7a53\"><span>From {{ dailyToday }} g/day today<\u002Fspan><span>Last restock {{ lastRestock }}<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noStock }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:10px;font:500 12px 'DM Sans';color:#8b7a53;line-height:1.5\">No food recorded yet. Add your current bag and we'll forecast the day she runs out.<\u002Fdiv>\n      <\u002Fsc-if>\n      <div sc-camel-on-click=\"{{ openRestock }}\" style=\"text-align:center;padding:13px;border-radius:13px;background:#20241f;color:#fff;font:700 12px 'Space Grotesk';letter-spacing:.03em;cursor:pointer;margin-top:16px\">+ RESTOCK / UPDATE<\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ hasRestocks }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"font:700 12px 'Space Grotesk';letter-spacing:.04em;color:#8b8678;margin:4px 0 9px\">RESTOCK LOG<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:1px;border-radius:14px;overflow:hidden;border:1px solid #e2ddd0;margin-bottom:20px\">\n      <sc-for list=\"{{ restockHistory }}\" as=\"r\" hint-placeholder-count=\"2\">\n        <div sc-camel-on-click=\"{{ r.open }}\" style=\"display:flex;align-items:center;gap:12px;background:#fff;padding:13px 15px;cursor:pointer\"><span style=\"width:9px;height:9px;border-radius:50%;background:#c9a25f\"><\u002Fspan><span style=\"font:600 12px 'DM Sans';flex:1\">Restocked · {{ r.kg }} kg bag<\u002Fspan><span style=\"font:500 11px 'DM Sans';color:#a29d8f\">{{ r.date }}<\u002Fspan><span style=\"font:700 14px 'Space Grotesk';color:#c2baa8\">›<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <!-- daily plan card -->\n    <div style=\"background:#3f5945;color:#fff;border-radius:18px;padding:18px;margin-bottom:16px\">\n      <div style=\"display:flex;align-items:flex-end;gap:8px\"><div style=\"font:700 40px 'Space Grotesk';line-height:.85\">{{ dailyToday }}<span style=\"font-size:15px;color:#9fb6a4\">g<\u002Fspan><\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#c3d3c6;margin-bottom:5px\">per day · {{ ageLabel }} band<\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:12px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.15)\">\n        <span style=\"font:500 12px 'DM Sans';color:#c3d3c6\">Feeds per day<\u002Fspan>\n        <div style=\"margin-left:auto;display:flex;align-items:center;gap:14px\">\n          <div sc-camel-on-click=\"{{ feedsMinus }}\" style=\"width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font:700 18px 'Space Grotesk';cursor:pointer\">−<\u002Fdiv>\n          <span style=\"font:700 22px 'Space Grotesk';width:20px;text-align:center\">{{ feeds }}<\u002Fspan>\n          <div sc-camel-on-click=\"{{ feedsPlus }}\" style=\"width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font:700 18px 'Space Grotesk';cursor:pointer\">+<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font:600 13px 'Space Grotesk';color:#c9a25f;margin-top:12px\">= {{ perFeed }} g per feed<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- age bands -->\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin:4px 0 9px\"><span style=\"font:700 12px 'Space Grotesk';letter-spacing:.04em;color:#8b8678\">HIGH-LEVEL SCHEDULE<\u002Fspan><span style=\"font:500 10px 'DM Sans';color:#a29d8f\">tap to edit<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:7px;margin-bottom:20px\">\n      <sc-for list=\"{{ bandRows }}\" as=\"b\" hint-placeholder-count=\"4\">\n        <div sc-camel-on-click=\"{{ b.edit }}\" style=\"display:flex;align-items:center;gap:10px;background:{{ b.bg }};border:1px solid {{ b.border }};border-radius:13px;padding:12px 14px;cursor:pointer\">\n          <div style=\"flex:1\"><span style=\"font:600 13px 'DM Sans';color:{{ b.ink }}\">{{ b.label }}<\u002Fspan><span style=\"font:500 11px 'DM Sans';color:#a29d8f\"> · {{ b.sub }}<\u002Fspan><\u002Fdiv>\n          <span style=\"font:700 15px 'Space Grotesk';color:{{ b.ink }}\">{{ b.grams }} g<\u002Fspan>\n          <sc-if value=\"{{ b.current }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font:700 8px 'Space Grotesk';background:#c9a25f;color:#3f2f12;padding:3px 6px;border-radius:10px\">NOW<\u002Fspan><\u002Fsc-if>\n          <span style=\"font:700 16px 'Space Grotesk';color:#c2baa8\">›<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <div sc-camel-on-click=\"{{ addBand }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;border:1px dashed #c2baa8;border-radius:13px;padding:12px 14px;cursor:pointer;color:#8b8678\"><span style=\"font:700 15px 'Space Grotesk'\">+<\u002Fspan><span style=\"font:600 12px 'DM Sans'\">Add a band<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- weekly breakdown -->\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px\"><span style=\"font:700 12px 'Space Grotesk';letter-spacing:.04em;color:#8b8678\">WEEKLY BREAKDOWN<\u002Fspan><span style=\"font:500 10px 'DM Sans';color:#a29d8f\">{{ ageLabel }}<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:1px;border-radius:14px;overflow:hidden;border:1px solid #e2ddd0;margin-bottom:22px\">\n      <sc-for list=\"{{ weeklyPlan }}\" as=\"w\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;align-items:center;gap:12px;background:{{ w.bg }};padding:11px 14px\">\n          <span style=\"font:700 12px 'Space Grotesk';color:{{ w.ink }};width:52px\">Wk {{ w.wk }}<\u002Fspan>\n          <div style=\"flex:1;height:6px;border-radius:3px;background:#e9e4d6\"><div style=\"height:6px;border-radius:3px;background:{{ w.bar }};width:{{ w.pct }}%\"><\u002Fdiv><\u002Fdiv>\n          <span style=\"font:700 13px 'Space Grotesk';color:{{ w.ink }};width:66px;text-align:right\"><span style=\"display:block\">{{ w.dailyG }} g<\u002Fspan><span style=\"display:block;font:500 9px 'DM Sans';color:#a29d8f\">{{ w.perMeal }} g/meal<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"font:500 11px 'DM Sans';color:#8b8678;line-height:1.5;margin:-10px 0 22px\">{{ breakdownNote }}<\u002Fdiv>\n    <div style=\"font:700 12px 'Space Grotesk';letter-spacing:.04em;color:#8b8678;margin-bottom:10px\">TODAY'S FEEDS — TAP TO RECORD<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:9px\">\n      <sc-for list=\"{{ slotRows }}\" as=\"s\" hint-placeholder-count=\"5\">\n        <div style=\"background:#fff;border:1px solid {{ s.border }};border-radius:15px;overflow:hidden\">\n          <div sc-camel-on-click=\"{{ s.toggle }}\" style=\"display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer\">\n            <div style=\"width:22px;height:22px;border-radius:50%;border:2px solid {{ s.ring }};background:{{ s.fill }};display:flex;align-items:center;justify-content:center;font:700 11px 'Space Grotesk';color:#fff\">{{ s.check }}<\u002Fdiv>\n            <div style=\"flex:1\"><div style=\"font:700 13px 'Space Grotesk'\">Feed {{ s.n }} · {{ s.t }}<\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:{{ s.subcolor }}\">{{ s.status }}<\u002Fdiv><\u002Fdiv>\n            <span style=\"font:700 14px 'Space Grotesk';color:#8b8678\">{{ perFeed }} g<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ s.hasEvents }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:0 15px 12px 49px;display:flex;flex-direction:column;gap:6px\">\n              <sc-for list=\"{{ s.events }}\" as=\"e\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;align-items:center;gap:9px\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ e.color }}\"><\u002Fspan><span style=\"font:600 11px 'DM Sans'\">{{ e.type }}<\u002Fspan><span style=\"font:500 11px 'DM Sans';color:#a29d8f\">{{ e.rel }} · {{ e.time }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ WEIGHT ============ -->\n<sc-if value=\"{{ isWeight }}\" hint-placeholder-val=\"{{ true }}\">\n<div class=\"scrollarea\" style=\"height:100%;padding:0 0 78px\">\n  <div class=\"pagehdr\" style=\"padding:52px 22px 16px;background:#3f5945\"><div style=\"font:700 24px 'Space Grotesk';color:#fff\">Weight<\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#c3d3c6;margin-top:2px\">Growth over time<\u002Fdiv><\u002Fdiv>\n  <div style=\"padding:18px\">\n    <div style=\"background:#3f5945;color:#fff;border-radius:18px;padding:18px 18px 12px;margin-bottom:16px\">\n      <div style=\"display:flex;align-items:flex-end;gap:8px;margin-bottom:8px\"><div style=\"font:700 42px 'Space Grotesk';line-height:.85\">{{ curKg }}<span style=\"font-size:16px;color:#9fb6a4\">kg<\u002Fspan><\u002Fdiv><div style=\"font:600 12px 'Space Grotesk';color:#c9a25f;margin-bottom:6px\">{{ gainLabel }}<\u002Fdiv><\u002Fdiv>\n      <svg sc-camel-view-box=\"0 0 272 130\" style=\"width:100%;height:auto;display:block\">\n        <polyline points=\"{{ weightPts }}\" fill=\"none\" stroke=\"#c9a25f\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n        <sc-for list=\"{{ weightDots }}\" as=\"d\" hint-placeholder-count=\"5\">\n          <circle cx=\"{{ d.cx }}\" cy=\"{{ d.cy }}\" r=\"3.5\" fill=\"#fff\" stroke=\"#c9a25f\" stroke-width=\"2\"><\u002Fcircle>\n        <\u002Fsc-for>\n      <\u002Fsvg>\n      <div style=\"display:flex;justify-content:space-between;margin-top:6px\"><sc-for list=\"{{ weightDots }}\" as=\"d\" hint-placeholder-count=\"5\"><span style=\"font:500 9px 'DM Sans';color:#9fb6a4\">{{ d.date }}<\u002Fspan><\u002Fsc-for><\u002Fdiv>\n    <\u002Fdiv>\n    <div sc-camel-on-click=\"{{ openWeight }}\" style=\"text-align:center;padding:14px;border-radius:14px;background:#20241f;color:#fff;font:700 12px 'Space Grotesk';letter-spacing:.03em;cursor:pointer;margin-bottom:20px\">+ LOG WEIGHT<\u002Fdiv>\n    <div style=\"font:700 12px 'Space Grotesk';letter-spacing:.04em;color:#8b8678;margin-bottom:10px\">HISTORY<\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:1px;border-radius:14px;overflow:hidden;border:1px solid #e2ddd0\">\n      <sc-for list=\"{{ weightHistory }}\" as=\"h\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;align-items:center;gap:12px;background:#fff;padding:13px 15px\"><span style=\"font:600 12px 'DM Sans';flex:1\">{{ h.date }}<\u002Fspan><span style=\"font:500 11px 'DM Sans';color:#a29d8f\">{{ h.delta }}<\u002Fspan><span style=\"font:700 15px 'Space Grotesk';color:#3f5945\">{{ h.kg }} kg<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ VETS ============ -->\n<sc-if value=\"{{ isVets }}\" hint-placeholder-val=\"{{ true }}\">\n<div class=\"scrollarea\" style=\"height:100%;padding:0 0 78px\">\n  <div class=\"pagehdr\" style=\"padding:52px 22px 16px;background:#3f5945\"><div style=\"font:700 24px 'Space Grotesk';color:#fff\">Vets<\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#c3d3c6;margin-top:2px\">Worming, jabs, flea &amp; tick, visits<\u002Fdiv><\u002Fdiv>\n  <div style=\"padding:18px\">\n    <div style=\"font:700 12px 'Space Grotesk';letter-spacing:.04em;color:#8b8678;margin-bottom:10px\">COMING UP<\u002Fdiv>\n    <sc-if value=\"{{ hasUpcoming }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:22px\">\n      <sc-for list=\"{{ vetUpcoming }}\" as=\"u\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;align-items:center;gap:12px;background:#faf5ea;border:1px solid #ecdcbb;border-radius:14px;padding:13px 15px\">\n          <div style=\"width:38px;height:38px;border-radius:11px;background:{{ u.color }};display:flex;align-items:center;justify-content:center;font:700 14px 'Space Grotesk';color:#fff\">{{ u.tag }}<\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font:700 13px 'Space Grotesk'\">{{ u.cat }}<\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#8b7a53\">{{ u.product }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:right\"><div style=\"font:700 13px 'Space Grotesk';color:#8a6a24\">{{ u.next }}<\u002Fdiv><div style=\"font:500 10px 'DM Sans';color:#a29d8f\">{{ u.away }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ noUpcoming }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#fff;border:1px dashed #d5cfc0;border-radius:14px;padding:20px 16px;text-align:center;margin-bottom:22px;font:500 12px 'DM Sans';color:#8b8678\">Nothing scheduled. Log a record with a \"next due\" date to see it here.<\u002Fdiv>\n    <\u002Fsc-if>\n    <div sc-camel-on-click=\"{{ openVet }}\" style=\"text-align:center;padding:14px;border-radius:14px;background:#20241f;color:#fff;font:700 12px 'Space Grotesk';letter-spacing:.03em;cursor:pointer;margin-bottom:22px\">+ LOG VET RECORD<\u002Fdiv>\n    <div style=\"font:700 12px 'Space Grotesk';letter-spacing:.04em;color:#8b8678;margin-bottom:10px\">HISTORY<\u002Fdiv>\n    <sc-if value=\"{{ hasVetHistory }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;flex-direction:column;gap:1px;border-radius:14px;overflow:hidden;border:1px solid #e2ddd0\">\n      <sc-for list=\"{{ vetHistory }}\" as=\"v\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;align-items:center;gap:12px;background:#fff;padding:12px 15px\">\n          <div style=\"width:30px;height:30px;border-radius:9px;background:{{ v.color }};display:flex;align-items:center;justify-content:center;font:700 11px 'Space Grotesk';color:#fff\">{{ v.tag }}<\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font:600 12px 'DM Sans'\">{{ v.cat }}<\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#a29d8f\">{{ v.product }}<\u002Fdiv><\u002Fdiv>\n          <span style=\"font:600 12px 'Space Grotesk';color:#8b8678\">{{ v.date }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ noVetHistory }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#fff;border:1px dashed #d5cfc0;border-radius:14px;padding:20px 16px;text-align:center;font:500 12px 'DM Sans';color:#8b8678\">No vet records yet.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ TAB BAR ============ -->\n<div class=\"tabbar\" style=\"position:absolute;left:0;right:0;bottom:0;height:70px;display:flex;justify-content:space-around;align-items:center;padding:8px 12px 22px;background:rgba(243,241,234,.94);backdrop-filter:blur(14px);border-top:1px solid #e2ddd0;z-index:40\">\n  <div sc-camel-on-click=\"{{ goHome }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:5px;font:600 9px 'DM Sans';color:{{ homeColor }};cursor:pointer\"><span style=\"width:20px;height:20px;border-radius:6px;background:{{ homeDot }}\"><\u002Fspan>Habits<\u002Fdiv>\n  <div sc-camel-on-click=\"{{ goFeeds }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:5px;font:600 9px 'DM Sans';color:{{ feedsColor }};cursor:pointer\"><span style=\"width:20px;height:20px;border-radius:6px;background:{{ feedsDot }}\"><\u002Fspan>Food<\u002Fdiv>\n  <div sc-camel-on-click=\"{{ goWeight }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:5px;font:600 9px 'DM Sans';color:{{ weightColor }};cursor:pointer\"><span style=\"width:20px;height:20px;border-radius:6px;background:{{ weightDot }}\"><\u002Fspan>Weight<\u002Fdiv>\n  <div sc-camel-on-click=\"{{ goVets }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:5px;font:600 9px 'DM Sans';color:{{ vetsColor }};cursor:pointer\"><span style=\"width:20px;height:20px;border-radius:6px;background:{{ vetsDot }}\"><\u002Fspan>Vets<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ MODALS ============ -->\n<sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div sc-camel-on-click=\"{{ closeModal }}\" style=\"position:absolute;inset:0;background:rgba(20,24,20,.4);z-index:70;animation:fade .18s ease\"><\u002Fdiv>\n<div style=\"position:absolute;left:0;right:0;bottom:0;z-index:80;background:#f3f1ea;border-radius:26px 26px 0 0;padding:10px 20px 30px;animation:slideup .26s cubic-bezier(.2,.8,.2,1);max-height:86%;overflow-y:auto\">\n  <div style=\"width:38px;height:5px;border-radius:3px;background:#d5cfc0;margin:4px auto 16px\"><\u002Fdiv>\n\n  <!-- MORE / add category launcher -->\n  <sc-if value=\"{{ isMore }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"font:700 18px 'Space Grotesk';margin-bottom:14px\">Log more<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px\">\n      <sc-for list=\"{{ catRows }}\" as=\"c\" hint-placeholder-count=\"1\">\n        <div sc-camel-on-click=\"{{ c.log }}\" style=\"display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e2ddd0;border-radius:14px;padding:14px;cursor:pointer\"><span style=\"width:14px;height:14px;border-radius:5px;background:{{ c.color }}\"><\u002Fspan><span style=\"font:600 13px 'DM Sans'\">{{ c.name }}<\u002Fspan><\u002Fdiv>\n      <\u002Fsc-for>\n      <div sc-camel-on-click=\"{{ openAddCat }}\" style=\"display:flex;align-items:center;gap:10px;background:transparent;border:1px dashed #c2baa8;border-radius:14px;padding:14px;cursor:pointer;color:#8b8678\"><span style=\"font:700 16px 'Space Grotesk'\">+<\u002Fspan><span style=\"font:600 13px 'DM Sans'\">New category<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ADD CATEGORY -->\n  <sc-if value=\"{{ isAddCat }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"font:700 18px 'Space Grotesk';margin-bottom:14px\">New category<\u002Fdiv>\n    <input value=\"{{ form.name }}\" sc-camel-on-input=\"{{ onName }}\" placeholder=\"Category name (e.g. Walk, Nap, Meds)\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:14px;font:500 14px 'DM Sans';margin-bottom:16px;outline:none\">\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:9px\">Colour<\u002Fdiv>\n    <div style=\"display:flex;gap:12px;margin-bottom:22px\">\n      <sc-for list=\"{{ swatches }}\" as=\"s\" hint-placeholder-count=\"6\">\n        <div sc-camel-on-click=\"{{ s.pick }}\" style=\"width:38px;height:38px;border-radius:50%;background:{{ s.color }};cursor:pointer;border:3px solid {{ s.sel }};box-shadow:0 2px 6px rgba(0,0,0,.1)\"><\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div sc-camel-on-click=\"{{ saveCat }}\" style=\"text-align:center;padding:15px;border-radius:14px;background:#3f5945;color:#fff;font:700 13px 'Space Grotesk';letter-spacing:.03em;cursor:pointer\">CREATE CATEGORY<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- LOG WEIGHT -->\n  <sc-if value=\"{{ isWeightModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"font:700 18px 'Space Grotesk';margin-bottom:14px\">Log weight<\u002Fdiv>\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Weight (kg)<\u002Fdiv>\n    <input value=\"{{ form.kg }}\" sc-camel-on-input=\"{{ onKg }}\" type=\"number\" placeholder=\"5.4\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:14px;font:700 22px 'Space Grotesk';margin-bottom:16px;outline:none\">\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Date<\u002Fdiv>\n    <input value=\"{{ form.date }}\" sc-camel-on-input=\"{{ onDate }}\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:14px;font:500 14px 'DM Sans';margin-bottom:22px;outline:none\">\n    <div sc-camel-on-click=\"{{ saveWeight }}\" style=\"text-align:center;padding:15px;border-radius:14px;background:#3f5945;color:#fff;font:700 13px 'Space Grotesk';letter-spacing:.03em;cursor:pointer\">SAVE<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- LOG VET -->\n  <sc-if value=\"{{ isVetModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"font:700 18px 'Space Grotesk';margin-bottom:14px\">Log vet record<\u002Fdiv>\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:9px\">Type<\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px\">\n      <sc-for list=\"{{ vetTypeRows }}\" as=\"t\" hint-placeholder-count=\"5\">\n        <div sc-camel-on-click=\"{{ t.pick }}\" style=\"padding:10px 14px;border-radius:11px;background:{{ t.bg }};color:{{ t.ink }};font:600 12px 'DM Sans';cursor:pointer;border:1px solid {{ t.border }}\">{{ t.name }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <input value=\"{{ form.product }}\" sc-camel-on-input=\"{{ onProduct }}\" placeholder=\"Product / notes (e.g. Panacur)\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:14px;font:500 14px 'DM Sans';margin-bottom:14px;outline:none\">\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Date given<\u002Fdiv>\n    <input value=\"{{ form.date }}\" sc-camel-on-input=\"{{ onDate }}\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:13px;font:500 13px 'DM Sans';outline:none;margin-bottom:16px\">\n\n    <div style=\"font:700 11px 'Space Grotesk';letter-spacing:.04em;color:#8b8678;margin-bottom:8px\">SCHEDULE<\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-bottom:14px\">\n      <sc-for list=\"{{ repChips }}\" as=\"c\" hint-placeholder-count=\"2\">\n        <div sc-camel-on-click=\"{{ c.pick }}\" style=\"flex:1;text-align:center;padding:11px;border-radius:11px;background:{{ c.bg }};color:{{ c.ink }};font:600 12px 'DM Sans';cursor:pointer;border:1px solid {{ c.border }}\">{{ c.name }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ notRep }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Next due (optional)<\u002Fdiv>\n      <input value=\"{{ form.next }}\" sc-camel-on-input=\"{{ onNext }}\" placeholder=\"e.g. 10 Aug\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:13px;font:500 13px 'DM Sans';outline:none;margin-bottom:22px\">\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ vetRep }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Repeat every<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px\">\n        <div sc-camel-on-click=\"{{ repEveryMinus }}\" style=\"width:40px;height:40px;border-radius:11px;background:#e5e1d6;display:flex;align-items:center;justify-content:center;font:700 20px 'Space Grotesk';cursor:pointer\">−<\u002Fdiv>\n        <span style=\"font:700 24px 'Space Grotesk';min-width:28px;text-align:center\">{{ repEvery }}<\u002Fspan>\n        <div sc-camel-on-click=\"{{ repEveryPlus }}\" style=\"width:40px;height:40px;border-radius:11px;background:#3f5945;color:#fff;display:flex;align-items:center;justify-content:center;font:700 20px 'Space Grotesk';cursor:pointer\">+<\u002Fdiv>\n        <div style=\"flex:1;display:flex;gap:6px\">\n          <sc-for list=\"{{ unitChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div sc-camel-on-click=\"{{ c.pick }}\" style=\"flex:1;text-align:center;padding:9px 4px;border-radius:10px;background:{{ c.bg }};color:{{ c.ink }};font:600 11px 'DM Sans';cursor:pointer;border:1px solid {{ c.border }};text-transform:capitalize\">{{ c.name }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Ends<\u002Fdiv>\n      <div style=\"display:flex;gap:8px;margin-bottom:12px\">\n        <sc-for list=\"{{ endChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <div sc-camel-on-click=\"{{ c.pick }}\" style=\"flex:1;text-align:center;padding:10px 4px;border-radius:11px;background:{{ c.bg }};color:{{ c.ink }};font:600 12px 'DM Sans';cursor:pointer;border:1px solid {{ c.border }}\">{{ c.name }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ endIsCount }}\" hint-placeholder-val=\"{{ false }}\">\n        <input value=\"{{ form.endCount }}\" sc-camel-on-input=\"{{ onEndCount }}\" type=\"number\" placeholder=\"Number of repeats (e.g. 6)\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:13px;font:500 13px 'DM Sans';outline:none;margin-bottom:22px\">\n      <\u002Fsc-if>\n      <sc-if value=\"{{ endIsDate }}\" hint-placeholder-val=\"{{ false }}\">\n        <input value=\"{{ form.endDate }}\" sc-camel-on-input=\"{{ onEndDate }}\" placeholder=\"Stop after date (e.g. 1 Dec 2026)\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:13px;font:500 13px 'DM Sans';outline:none;margin-bottom:22px\">\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <div sc-camel-on-click=\"{{ saveVet }}\" style=\"text-align:center;padding:15px;border-radius:14px;background:#3f5945;color:#fff;font:700 13px 'Space Grotesk';letter-spacing:.03em;cursor:pointer\">SAVE RECORD<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- RESTOCK / UPDATE FOOD -->\n  <sc-if value=\"{{ isRestockModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"font:700 18px 'Space Grotesk';margin-bottom:4px\">Food stock<\u002Fdiv>\n    <div style=\"font:500 11px 'DM Sans';color:#8b8678;margin-bottom:16px\">Using {{ dailyToday }} g/day<\u002Fdiv>\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Remaining now (kg)<\u002Fdiv>\n    <input value=\"{{ form.remain }}\" sc-camel-on-input=\"{{ onRemain }}\" type=\"number\" placeholder=\"4.2\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:14px;font:700 22px 'Space Grotesk';margin-bottom:16px;outline:none\">\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Add a new bag (kg) — optional<\u002Fdiv>\n    <input value=\"{{ form.bag }}\" sc-camel-on-input=\"{{ onBag }}\" type=\"number\" placeholder=\"12\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:14px;font:700 22px 'Space Grotesk';margin-bottom:22px;outline:none\">\n    <div sc-camel-on-click=\"{{ saveRestock }}\" style=\"text-align:center;padding:15px;border-radius:14px;background:#3f5945;color:#fff;font:700 13px 'Space Grotesk';letter-spacing:.03em;cursor:pointer\">UPDATE STOCK<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- EDIT BAND -->\n  <sc-if value=\"{{ isBandModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"font:700 18px 'Space Grotesk';margin-bottom:2px\">{{ editBandLabel }}<\u002Fdiv>\n    <div style=\"font:500 11px 'DM Sans';color:#8b8678;margin-bottom:16px\">Named automatically from its duration<\u002Fdiv>\n\n    <div style=\"font:700 11px 'Space Grotesk';letter-spacing:.04em;color:#8b8678;margin-bottom:8px\">DEFINE DURATION IN<\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-bottom:14px\">\n      <sc-for list=\"{{ bandUnitChips }}\" as=\"c\" hint-placeholder-count=\"2\">\n        <div sc-camel-on-click=\"{{ c.pick }}\" style=\"flex:1;text-align:center;padding:11px;border-radius:11px;background:{{ c.bg }};color:{{ c.ink }};font:600 12px 'DM Sans';cursor:pointer;border:1px solid {{ c.border }}\">{{ c.name }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px;margin-bottom:18px\">\n      <div style=\"flex:1;background:#fff;border:1px solid #e2ddd0;border-radius:14px;padding:12px 14px\">\n        <div style=\"font:500 10px 'DM Sans';color:#8b8678;margin-bottom:6px\">{{ editFromLabel }}<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div sc-camel-on-click=\"{{ bandFromMinus }}\" style=\"width:30px;height:30px;border-radius:9px;background:#e5e1d6;display:flex;align-items:center;justify-content:center;font:700 17px 'Space Grotesk';cursor:pointer\">−<\u002Fdiv>\n          <span style=\"font:700 20px 'Space Grotesk'\">{{ editBandFrom }}<\u002Fspan>\n          <div sc-camel-on-click=\"{{ bandFromPlus }}\" style=\"width:30px;height:30px;border-radius:9px;background:#e5e1d6;display:flex;align-items:center;justify-content:center;font:700 17px 'Space Grotesk';cursor:pointer\">+<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:#fff;border:1px solid #e2ddd0;border-radius:14px;padding:12px 14px\">\n        <div style=\"font:500 10px 'DM Sans';color:#8b8678;margin-bottom:6px\">{{ editToLabel }}<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div sc-camel-on-click=\"{{ bandToMinus }}\" style=\"width:30px;height:30px;border-radius:9px;background:#e5e1d6;display:flex;align-items:center;justify-content:center;font:700 17px 'Space Grotesk';cursor:pointer\">−<\u002Fdiv>\n          <span style=\"font:700 20px 'Space Grotesk'\">{{ editBandTo }}<\u002Fspan>\n          <div sc-camel-on-click=\"{{ bandToPlus }}\" style=\"width:30px;height:30px;border-radius:9px;background:#e5e1d6;display:flex;align-items:center;justify-content:center;font:700 17px 'Space Grotesk';cursor:pointer\">+<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font:700 11px 'Space Grotesk';letter-spacing:.04em;color:#8b8678;margin-bottom:8px\">AMOUNT · GRAMS PER DAY<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:22px;margin-bottom:18px\">\n      <div sc-camel-on-click=\"{{ bandGramsMinus }}\" style=\"width:48px;height:48px;border-radius:14px;background:#e5e1d6;display:flex;align-items:center;justify-content:center;font:700 24px 'Space Grotesk';cursor:pointer\">−<\u002Fdiv>\n      <div style=\"text-align:center;min-width:96px\"><div style=\"font:700 40px 'Space Grotesk';line-height:.9;color:#3f5945\">{{ editBandGrams }}<\u002Fdiv><div style=\"font:600 10px 'DM Sans';color:#8b8678\">g / day<\u002Fdiv><\u002Fdiv>\n      <div sc-camel-on-click=\"{{ bandGramsPlus }}\" style=\"width:48px;height:48px;border-radius:14px;background:#3f5945;color:#fff;display:flex;align-items:center;justify-content:center;font:700 24px 'Space Grotesk';cursor:pointer\">+<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font:700 11px 'Space Grotesk';letter-spacing:.04em;color:#8b8678;margin-bottom:8px\">FREQUENCY · FEEDS PER DAY<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:22px;margin-bottom:20px\">\n      <div sc-camel-on-click=\"{{ bandFeedsMinus }}\" style=\"width:48px;height:48px;border-radius:14px;background:#e5e1d6;display:flex;align-items:center;justify-content:center;font:700 24px 'Space Grotesk';cursor:pointer\">−<\u002Fdiv>\n      <div style=\"text-align:center;min-width:96px\"><div style=\"font:700 40px 'Space Grotesk';line-height:.9;color:#3f5945\">{{ editBandFeeds }}<\u002Fdiv><div style=\"font:600 10px 'DM Sans';color:#8b8678\">feeds / day<\u002Fdiv><\u002Fdiv>\n      <div sc-camel-on-click=\"{{ bandFeedsPlus }}\" style=\"width:48px;height:48px;border-radius:14px;background:#3f5945;color:#fff;display:flex;align-items:center;justify-content:center;font:700 24px 'Space Grotesk';cursor:pointer\">+<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div sc-camel-on-click=\"{{ closeModal }}\" style=\"text-align:center;padding:15px;border-radius:14px;background:#3f5945;color:#fff;font:700 13px 'Space Grotesk';letter-spacing:.03em;cursor:pointer;margin-bottom:9px\">DONE<\u002Fdiv>\n    <sc-if value=\"{{ canDeleteBand }}\" hint-placeholder-val=\"{{ true }}\">\n      <div sc-camel-on-click=\"{{ deleteBand }}\" style=\"text-align:center;padding:13px;border-radius:14px;background:transparent;border:1px solid #eccfc6;color:#b4553d;font:700 12px 'Space Grotesk';letter-spacing:.03em;cursor:pointer\">DELETE BAND<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsc-if>\n\n  <!-- EDIT RESTOCK -->\n  <sc-if value=\"{{ isRestockEdit }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"font:700 18px 'Space Grotesk';margin-bottom:14px\">Edit restock<\u002Fdiv>\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Bag size (kg)<\u002Fdiv>\n    <input value=\"{{ form.ekg }}\" sc-camel-on-input=\"{{ onEkg }}\" type=\"number\" placeholder=\"12\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:14px;font:700 22px 'Space Grotesk';margin-bottom:16px;outline:none\">\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Date<\u002Fdiv>\n    <input value=\"{{ form.edate }}\" sc-camel-on-input=\"{{ onEdate }}\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:14px;font:500 14px 'DM Sans';margin-bottom:22px;outline:none\">\n    <div sc-camel-on-click=\"{{ saveRestockEdit }}\" style=\"text-align:center;padding:15px;border-radius:14px;background:#3f5945;color:#fff;font:700 13px 'Space Grotesk';letter-spacing:.03em;cursor:pointer;margin-bottom:9px\">SAVE<\u002Fdiv>\n    <div sc-camel-on-click=\"{{ deleteRestockEntry }}\" style=\"text-align:center;padding:13px;border-radius:14px;background:transparent;border:1px solid #eccfc6;color:#b4553d;font:700 12px 'Space Grotesk';letter-spacing:.03em;cursor:pointer\">DELETE<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- PROFILE -->\n  <sc-if value=\"{{ isProfile }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px\">\n      <label style=\"cursor:pointer;position:relative\">\n        <input type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ onPhoto }}\" style=\"display:none\">\n        <div style=\"{{ profilePhoto }}\"><\u002Fdiv>\n      <\u002Flabel>\n      <div><div style=\"font:700 22px 'Space Grotesk';letter-spacing:.02em\">{{ petNameUpper }}<\u002Fdiv><div style=\"font:500 12px 'DM Sans';color:#8b8678;margin-top:2px\">{{ ageText }}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Name<\u002Fdiv>\n    <input value=\"{{ form.pname }}\" sc-camel-on-input=\"{{ onPname }}\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:13px;font:500 14px 'DM Sans';margin-bottom:14px;outline:none\">\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Breed<\u002Fdiv>\n    <input value=\"{{ form.pbreed }}\" sc-camel-on-input=\"{{ onPbreed }}\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:13px;font:500 14px 'DM Sans';margin-bottom:14px;outline:none\">\n    <div style=\"font:600 11px 'DM Sans';color:#8b8678;margin-bottom:8px\">Date of birth<\u002Fdiv>\n    <input type=\"date\" value=\"{{ form.pdob }}\" sc-camel-on-input=\"{{ onPdob }}\" style=\"width:100%;border:1px solid #d5cfc0;background:#fff;border-radius:13px;padding:13px;font:500 14px 'DM Sans';margin-bottom:22px;outline:none\">\n    <div sc-camel-on-click=\"{{ saveProfile }}\" style=\"text-align:center;padding:15px;border-radius:14px;background:#3f5945;color:#fff;font:700 13px 'Space Grotesk';letter-spacing:.03em;cursor:pointer\">SAVE<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- SETTINGS -->\n  <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"font:700 18px 'Space Grotesk';margin-bottom:14px\">Settings<\u002Fdiv>\n    <div sc-camel-on-click=\"{{ openProfile }}\" style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e2ddd0;border-radius:14px;padding:13px 15px;cursor:pointer;margin-bottom:9px\">\n      <div style=\"{{ settingsPhoto }}\"><\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font:700 13px 'Space Grotesk'\">Leia's profile<\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#8b8678\">Breed, age, weights &amp; plan<\u002Fdiv><\u002Fdiv>\n      <span style=\"font:700 16px 'Space Grotesk';color:#c2baa8\">›<\u002Fspan>\n    <\u002Fdiv>\n    <label style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e2ddd0;border-radius:14px;padding:13px 15px;cursor:pointer;margin-bottom:9px\">\n      <input type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ onPhoto }}\" style=\"display:none\">\n      <div style=\"{{ settingsPhoto }}\"><\u002Fdiv>\n      <div style=\"flex:1\"><div style=\"font:700 13px 'Space Grotesk'\">Leia's photo<\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#8b8678\">Tap to choose from your phone<\u002Fdiv><\u002Fdiv>\n      <span style=\"font:600 12px 'Space Grotesk';color:#3f5945\">Change<\u002Fspan>\n    <\u002Flabel>\n    <div style=\"background:#fff;border:1px solid #e2ddd0;border-radius:14px;padding:13px 15px;margin-bottom:9px;font:500 11px 'DM Sans';color:#8b8678;line-height:1.5\">Everything you log is saved on this device only — it stays when you reopen the app, and isn't shared anywhere.<\u002Fdiv>\n    <div sc-camel-on-click=\"{{ resetAll }}\" style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #eccfc6;border-radius:14px;padding:13px 15px;cursor:pointer;margin-bottom:16px\">\n      <div style=\"flex:1\"><div style=\"font:700 13px 'Space Grotesk';color:#b4553d\">Reset all data<\u002Fdiv><div style=\"font:500 11px 'DM Sans';color:#c08a7c\">Clear everything and start fresh<\u002Fdiv><\u002Fdiv>\n      <span style=\"font:700 16px 'Space Grotesk';color:#c08a7c\">↺<\u002Fspan>\n    <\u002Fdiv>\n    <div sc-camel-on-click=\"{{ closeModal }}\" style=\"text-align:center;padding:15px;border-radius:14px;background:#20241f;color:#fff;font:700 13px 'Space Grotesk';letter-spacing:.03em;cursor:pointer\">DONE<\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- toast -->\n<sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:absolute;bottom:88px;left:50%;transform:translateX(-50%);z-index:90;background:#20241f;color:#fff;padding:11px 18px;border-radius:22px;font:600 12px 'DM Sans';white-space:nowrap;animation:pop .2s ease;box-shadow:0 8px 20px rgba(0,0,0,.25)\">{{ toast }}<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:384,&quot;height&quot;:744}}\">\nconst PKEY='leia_tracker_v1';\nconst DOB=new Date(2026,4,18); // 18 May 2026\nconst SLOT_TIMES = {\n  1:['12:00'], 2:['8:00','18:00'], 3:['7:30','13:30','19:30'],\n  4:['7:00','12:00','17:00','21:00'], 5:['7:00','10:30','14:00','17:30','21:00'],\n  6:['6:30','9:30','12:30','15:30','18:30','21:30']\n};\nconst VET_META = {\n  'Worming':      {color:'#3f5945', tag:'W'},\n  'Vaccination':  {color:'#5b83a3', tag:'V'},\n  'Flea & Tick':  {color:'#c77b52', tag:'F'},\n  'Vet visit':    {color:'#8a6d9c', tag:'C'},\n  'Medication':   {color:'#c9a25f', tag:'M'},\n};\nconst SWATCHES = ['#c9a25f','#3f5945','#5b83a3','#c77b52','#8a6d9c','#4f8a80'];\nconst MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\n\nfunction toMin(t){const [h,m]=t.split(':').map(Number);return h*60+m;}\nfunction fmt12(mins){let h=Math.floor(mins/60)%24,m=((mins%60)+60)%60;return h+':'+String(m).padStart(2,'0');}\nfunction fmtDate(d){return d.getDate()+' '+MON[d.getMonth()];}\nfunction ageYMD(dob,now){let y=now.getFullYear()-dob.getFullYear();let m=now.getMonth()-dob.getMonth();let d=now.getDate()-dob.getDate();if(d<0){m--;d+=new Date(now.getFullYear(),now.getMonth(),0).getDate();}if(m<0){y--;m+=12;}return {y,m,d};}\nconst WPM=4.345;\nfunction bandWeeks(b,key){return (b.unit==='months')?(b[key]*WPM):b[key];}\nfunction addInterval(d,every,unit){const r=new Date(d);if(unit==='days')r.setDate(r.getDate()+every);else if(unit==='weeks')r.setDate(r.getDate()+every*7);else r.setMonth(r.getMonth()+every);return r;}\nfunction normalizeBands(bands){\n  const out=bands.map(b=>({...b}));\n  const order=out.map((b,i)=>i).sort((a,z)=>bandWeeks(out[a],'from')-bandWeeks(out[z],'from'));\n  for(let k=1;k<order.length;k++){\n    const prev=out[order[k-1]], cur=out[order[k]];\n    const prevToW=bandWeeks(prev,'to');\n    cur.from = cur.unit==='months' ? Math.max(1,Math.round(prevToW/WPM)) : Math.round(prevToW);\n    if(cur.from>=cur.to) cur.to=cur.from+1;\n  }\n  return out;\n}\nconst round5 = n => Math.round(n/5)*5;\nfunction freshSlots(n){return SLOT_TIMES[n].map(()=>({done:false,at:null}));}\n\nfunction blankData(){\n  return {\n    photo:null, feeds:5,\n    slots:freshSlots(5),\n    events:[],\n    cats:[{id:'training',name:'Training',color:'#8a6d9c'}],\n    weights:[{date:'20 Jul',kg:5.4}],\n    vets:[],\n    bands:[\n      {label:'2–4 months',unit:'months',from:2,to:4,grams:280,feeds:5},\n      {label:'4–6 months',unit:'months',from:4,to:6,grams:320,feeds:4},\n      {label:'6–12 months',unit:'months',from:6,to:12,grams:300,feeds:3},\n      {label:'12 months +',unit:'months',from:12,to:28,grams:260,feeds:2},\n    ],\n    stockG:0, refBagKg:12, restocks:[],\n    profile:{name:'Leia',breed:'Golden Retriever × Cocker Spaniel',dob:'2026-05-18'},\n  };\n}\n\nclass Component extends DCLogic {\n  state = { tab:'home', modal:null, toast:null, editBand:0, form:{}, ...blankData() };\n\n  componentDidMount(){\n    try{ const raw=localStorage.getItem(PKEY); if(raw){ const d=JSON.parse(raw); if(d&&typeof d==='object'){ if(Array.isArray(d.bands)) d.bands=normalizeBands(d.bands); this.setState(d); } } }catch(e){}\n    this.setState(s=>({bands:normalizeBands(s.bands)}));\n    this._tick=setInterval(()=>this.forceUpdate(),60000); // keep clock & timeline fresh\n  }\n  componentWillUnmount(){ clearInterval(this._tick); }\n  componentDidUpdate(){\n    try{\n      const {photo,feeds,slots,events,cats,weights,vets,bands,stockG,refBagKg,restocks,profile}=this.state;\n      localStorage.setItem(PKEY,JSON.stringify({photo,feeds,slots,events,cats,weights,vets,bands,stockG,refBagKg,restocks,profile}));\n    }catch(e){}\n  }\n\n  flash(msg){ this.setState({toast:msg}); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:null}),1600); }\n  nowMin(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); }\n\n  onPhoto(e){\n    const file=e.target.files&&e.target.files[0]; if(!file) return;\n    const reader=new FileReader();\n    reader.onload=ev=>{\n      const img=new Image();\n      img.onload=()=>{\n        const size=240, c=document.createElement('canvas'); c.width=size; c.height=size;\n        const ctx=c.getContext('2d');\n        const scale=Math.max(size/img.width,size/img.height);\n        const w=img.width*scale,h=img.height*scale;\n        ctx.drawImage(img,(size-w)/2,(size-h)/2,w,h);\n        this.setState({photo:c.toDataURL('image/jpeg',0.82)});\n        this.flash('Photo updated ✓');\n      };\n      img.src=ev.target.result;\n    };\n    reader.readAsDataURL(file);\n  }\n\n  resetAll(){\n    if(typeof window!=='undefined' && window.confirm && !window.confirm('Reset all data and start fresh? This cannot be undone.')) return;\n    try{ localStorage.removeItem(PKEY); }catch(e){}\n    this.setState({ tab:'home', modal:null, editBand:0, form:{}, ...blankData() });\n    this.flash('All data reset');\n  }\n\n  adjBand(d){ this.setState(s=>({bands:s.bands.map((b,i)=>i===s.editBand?{...b,grams:Math.max(0,b.grams+d)}:b)})); }\n  dobDate(){ return new Date((this.state.profile&&this.state.profile.dob)||'2026-05-18'); }\n  curBandIdx(){ const w=(new Date()-this.dobDate())/86400000/7; const b=this.state.bands; let i=b.findIndex(x=>w>=bandWeeks(x,'from')&&w<bandWeeks(x,'to')); if(i<0){let bf=-1;b.forEach((x,j)=>{const f=bandWeeks(x,'from');if(w>=f&&f>bf){bf=f;i=j;}});if(i<0)i=0;} return i; }\n  saveProfile(){ const f=this.state.form; this.setState(s=>({profile:{name:(f.pname||'').trim()||'Leia',breed:(f.pbreed||'').trim(),dob:f.pdob||(s.profile&&s.profile.dob)||'2026-05-18'},modal:null,form:{}})); this.flash('Profile saved ✓'); }\n  adjBandField(key,d){\n    this.setState(s=>{\n      const bands=s.bands.map(b=>({...b}));\n      const b=bands[s.editBand]; if(!b) return {};\n      const unit=b.unit||'weeks';\n      const toU=w=> unit==='months'? w/WPM : w; // weeks -> this band's unit\n      const order=bands.map((bb,i)=>({i,fw:bandWeeks(bb,'from')})).sort((a,z)=>a.fw-z.fw);\n      const pos=order.findIndex(o=>o.i===s.editBand);\n      const prev=pos>0?bands[order[pos-1].i]:null;\n      const next=pos<order.length-1?bands[order[pos+1].i]:null;\n      let v=(b[key]||0)+d;\n      if(key==='from'){ const minU=prev?Math.ceil(toU(bandWeeks(prev,'to'))):1; v=Math.max(minU,Math.min(b.to-1,v)); }\n      if(key==='to'){ const maxU=next?Math.floor(toU(bandWeeks(next,'from'))):240; v=Math.max(b.from+1,Math.min(maxU,v)); }\n      b[key]=v;\n      return {bands};\n    });\n  }\n  bandFeeds(d){\n    const eb=this.state.bands[this.state.editBand]; if(!eb) return;\n    const n=Math.max(1,Math.min(6,(eb.feeds||5)+d));\n    const cur=this.curBandIdx();\n    this.setState(s=>({bands:s.bands.map((b,i)=>i===s.editBand?{...b,feeds:n}:b)}));\n    if(this.state.editBand===cur) this.setFeeds(n);\n  }\n  addBand(){\n    this.setState(s=>{ const last=s.bands[s.bands.length-1];\n      const nb={label:'New band',from:last.to,to:last.to+8,grams:last.grams,feeds:last.feeds||3};\n      return {bands:normalizeBands([...s.bands,nb]),modal:'band',editBand:s.bands.length};\n    });\n  }\n  deleteBand(){\n    this.setState(s=>{ if(s.bands.length<=1) return {modal:null};\n      return {bands:normalizeBands(s.bands.filter((_,i)=>i!==s.editBand)),editBand:0,modal:null}; });\n    this.flash('Band removed');\n  }\n  openRestockEdit(i){ const r=this.state.restocks[i]; if(!r) return; this.setState({modal:'restockedit',editRestock:i,form:{ekg:String(r.kg),edate:r.date}}); }\n  saveRestockEdit(){\n    const f=this.state.form; const kg=parseFloat(f.ekg); if(!kg){this.flash('Enter a weight'); return;}\n his.flash('Feed '+(i+1)+' recorded ✓');\n  }\n  logEvent(type,color){\n    const now=this.nowMin();\n    const done=this.state.slots.map((x,i)=>x.done?i:-1).filter(i=>i>=0);\n    const slot = done.length?done[done.length-1]:0;\n    this.setState(s=>({events:[...s.events,{type,slot,at:now,color}]}));\n    this.flash(type+' logged ✓');\n  }\n  logCat(c){ this.logEvent(c.name,c.color); this.setState({modal:null}); }\n\n  setFeeds(n){\n    n=Math.max(1,Math.min(6,n));\n    const cur=this.curBandIdx();\n    this.setState(s=>{\n      const done=s.slots.filter(x=>x.done);\n      const slots=SLOT_TIMES[n].map((_,i)=> done[i] ? {done:true,at:done[i].at} : {done:false,at:null});\n      const events=s.events.filter(e=>e.slot<n);\n      const bands=s.bands.map((b,i)=>i===cur?{...b,feeds:n}:b);\n      return {feeds:n,slots,events,bands};\n    });\n  }\n\n  saveCat(){\n    const name=(this.state.form.name||'').trim(); if(!name){this.flash('Name your category'); return;}\n    const color=this.state.form.color||'#c9a25f';\n    this.setState(s=>({cats:[...s.cats,{id:'c'+Date.now(),name,color}],modal:'more',form:{}}));\n    this.flash('“'+name+'” added');\n  }\n  saveWeight(){\n    const kg=parseFloat(this.state.form.kg); if(!kg){this.flash('Enter a weight'); return;}\n    const date=this.state.form.date||fmtDate(new Date());\n    this.setState(s=>({weights:[...s.weights,{date,kg}],modal:null,form:{}}));\n    this.flash(kg+' kg logged ✓');\n  }\n  saveVet(){\n    const f=this.state.form;\n    if(!(f.product||'').trim()){this.flash('Add a product / note'); return;}\n    const base=new Date();\n    let repeat=null, next=f.next||'';\n    if(f.rep){\n      const every=Math.max(1,parseInt(f.every)||1); const unit=f.unit||'weeks';\n      repeat={every,unit,endType:f.endType||'never',endCount:parseInt(f.endCount)||0,endDate:f.endDate||''};\n      next=fmtDate(addInterval(base,every,unit));\n    }\n    this.setState(s=>({vets:[...s.vets,{cat:f.cat||'Worming',product:f.product,date:f.date||fmtDate(base),baseISO:base.toISOString(),repeat,next}],modal:null,form:{}}));\n    this.flash('Record saved ✓');\n  }\n\n  renderVals(){\n    const s=this.state;\n    const now=new Date();\n    const prof=s.profile||{name:'Leia',breed:'Golden Retriever × Cocker Spaniel',dob:'2026-05-18'};\n    const dob=new Date(prof.dob||'2026-05-18');\n    const ageDays=Math.max(0,Math.floor((now-dob)/86400000));\n    const ageWeeks=Math.floor(ageDays/7);\n    const ageMonths=Math.floor(ageDays/30.44);\n    const ageLabel = ageWeeks<17 ? (ageWeeks+' weeks') : (ageMonths+' months');\n    const ymd=ageYMD(dob,now);\n    const petName=(prof.name||'Leia'), petBreed=prof.breed||'', petInitial=(petName.trim().charAt(0)||'L').toUpperCase();\n    const ageText=ageLabel+' · '+(ymd.y?ymd.y+'y ':'')+ymd.m+'m '+ymd.d+'d';\n    const clock=fmt12(this.nowMin());\n    const todayStr=fmtDate(now);\n\n    const ageWeeksF=ageDays/7;\n    const curW=Math.floor(ageWeeksF);\n    let curIdx=s.bands.findIndex(b=>ageWeeksF>=bandWeeks(b,'from')&&ageWeeksF<bandWeeks(b,'to'));\n    if(curIdx<0){ let bf=-1; s.bands.forEach((b,i)=>{const f=bandWeeks(b,'from'); if(ageWeeksF>=f&&f>bf){bf=f;curIdx=i;}}); if(curIdx<0) curIdx=0; }\n    const cb=s.bands[curIdx]||s.bands[0];\n\n    // bands ordered by start date\n    const sorted=s.bands.map((b,i)=>({b,i})).sort((a,z)=>bandWeeks(a.b,'from')-bandWeeks(z.b,'from'));\n    const posCur=sorted.findIndex(o=>o.i===curIdx);\n    const prevBand=posCur>0?sorted[posCur-1].b:null;\n\n    // band amount = daily total in its FINAL week; interim weeks ramp from prev band's final, per-meal rounded to 5 g\n    const bandFeedsOf=b=>b.feeds||s.feeds||1;\n    const weekDaily=(band,prev,w)=>{\n      const fW=Math.round(bandWeeks(band,'from')), tW=Math.round(bandWeeks(band,'to'));\n      const feeds=bandFeedsOf(band);\n      const endVal=band.grams, startVal=prev?prev.grams:band.grams;\n      const denom=Math.max(1,(tW-1)-(fW-1));\n      const t=Math.min(1,Math.max(0,(w-(fW-1))/denom));\n      const perMeal=round5((startVal+(endVal-startVal)*t)/feeds);\n      return {perMeal, daily:perMeal*feeds};\n    };\n\n    const cbFromW=Math.round(bandWeeks(cb,'from')), cbToW=Math.round(bandWeeks(cb,'to'));\n    const daily=weekDaily(cb,prevBand,Math.min(Math.max(curW,cbFromW),cbToW-1)).daily;\n    const perFeed=round5(daily/s.feeds);\n    const feedsDone=s.slots.filter(x=>x.done).length;\n    const gramsFed=feedsDone*perFeed;\n    const times=SLOT_TIMES[s.feeds];\n    const nextIdx=s.slots.findIndex(x=>!x.done);\n    const nextFeedTime = nextIdx<0 ? 'all done' : fmt12(toMin(times[nextIdx]));\n\n    // today timeline — uses real recorded times\n    const items=[];\n    s.slots.forEach((sl,i)=>{ if(sl.done){ const m=sl.at!=null?sl.at:toMin(times[i]); items.push({m,time:fmt12(m),label:'Feed',sub:'· '+perFeed+' g',color:'#3f5945'}); } });\n    s.events.forEach(e=>{ const m=e.at!=null?e.at:toMin(times[e.slot]||'8:00'); items.push({m,time:fmt12(m),label:e.type,sub:'',color:e.color}); });\n    items.sort((a,b)=>a.m-b.m);\n\n    // bands (ordered by date, dated, no gaps)\n    const bandLabel=b=>b.from+'–'+b.to+' '+(b.unit||'weeks');\n    const dayMs=86400000;\n    const bandRows=sorted.map(({b,i})=>{\n      const sD=new Date(dob.getTime()+bandWeeks(b,'from')*7*dayMs);\n      const eD=new Date(dob.getTime()+bandWeeks(b,'to')*7*dayMs);\n      return {label:bandLabel(b), sub:fmtDate(sD)+' – '+fmtDate(eD)+' · '+(b.feeds||5)+' feeds/day', grams:b.grams, current:i===curIdx,\n        bg:i===curIdx?'#eef2ec':'#fff', border:i===curIdx?'#c6d4c3':'#e2ddd0', ink:i===curIdx?'#3f5945':'#20241f',\n        edit:()=>this.setState({modal:'band',editBand:i})};\n    });\n    const eb=s.bands[s.editBand]||s.bands[0];\n\n    // weekly breakdown for current band\n    const weeklyPlan=[];\n    const fromW=cbFromW, toW=cbToW;\n    let maxG=1; for(let w=fromW;w<toW;w++){ maxG=Math.max(maxG,weekDaily(cb,prevBand,w).daily); }\n    for(let w=fromW;w<toW;w++){\n      const wd=weekDaily(cb,prevBand,w); const cur=w===curW;\n      weeklyPlan.push({wk:w, dailyG:wd.daily, perMeal:wd.perMeal, pct:Math.round(wd.daily/maxG*100),\n        bg:cur?'#eef2ec':'#fff', ink:cur?'#3f5945':'#20241f', bar:cur?'#c9a25f':'#c6d0c2'});\n    }\n    const breakdownNote='Each band’s amount is the daily total in its final week; interim weeks ramp linearly, rounded to the nearest 5 g per meal.';\n\n    // food stock forecast\n    const stockKg=(s.stockG/1000).toFixed(1);\n    const hasStock=s.stockG>0;\n    // schedule-aware forecast: consume each future day's interpolated amount until depleted\n    let _g=s.stockG, daysLeft=0;\n    for(let d=0; d<3650; d++){\n      const w=Math.floor((ageDays+d)/7);\n      let bi=s.bands.findIndex(b=>w>=bandWeeks(b,'from')&&w<bandWeeks(b,'to'));\n      if(bi<0){ let bf=-1; s.bands.forEach((b,j)=>{const f=bandWeeks(b,'from'); if(w>=f&&f>bf){bf=f;bi=j;}}); if(bi<0) bi=0; }\n      const bd=s.bands[bi]; const pos=sorted.findIndex(o=>o.i===bi); const pv=pos>0?sorted[pos-1].b:null;\n      const dd=weekDaily(bd,pv,w).daily;\n      if(dd<=0 || _g<dd) break;\n      _g-=dd; daysLeft++;\n    }\n    const runOutD=new Date(now); runOutD.setDate(runOutD.getDate()+daysLeft);\n    const runOut=fmtDate(runOutD);\n    const stockPct=Math.min(100,Math.round(s.stockG/(s.refBagKg*1000)*100));\n    const lastRestock=s.restocks.length?s.restocks[s.restocks.length-1].date:'—';\n    const restockHistory=s.restocks.map((r,i)=>({kg:r.kg,date:r.date,open:()=>this.openRestockEdit(i)})).reverse();\n\n    // slot rows (relative offsets from actual/scheduled feed time)\n    const slotRows=s.slots.map((sl,i)=>{\n      const base=sl.at!=null?sl.at:toMin(times[i]);\n      const evs=s.events.filter(e=>e.slot===i).sort((a,b)=>(a.at||0)-(b.at||0))\n        .map(e=>{ const at=e.at!=null?e.at:base; const diff=Math.round(at-base);\n          const rel = diff>=0 ? ('+'+diff+' min') : (diff+' min'); return {type:e.type,color:e.color,time:fmt12(at),rel}; });\n      return {n:i+1, t:fmt12(toMin(
